name: Docker CI

on:
  push:
    branches-ignore:
      - master
      - ci
    paths:
      - ".github/workflows/docker-ci.yml"
      - ".dockerignore"
      - "Dockerfile*"
      - "**/CMakeLists.txt"
      - "**/*.h"
      - "**/*.hpp"
      - "**/*.c"
      - "**/*.cpp"
      - "examples/server/openapi.yaml"
      - "examples/server/validate_openapi.py"

concurrency:
  group: docker-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/vulkan

jobs:
  check-ancestry:
    name: Check ancestry from docker branch
    runs-on: ubuntu-latest
    outputs:
      is-descendant: ${{ steps.ancestry.outputs.is-descendant }}
      safe-branch: ${{ steps.sanitize.outputs.safe-branch }}
      short-sha: ${{ steps.sha.outputs.short-sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch docker branch
        run: git fetch origin docker --depth=50

      - name: Check ancestry
        id: ancestry
        run: |
          if git merge-base --is-ancestor origin/docker HEAD; then
            echo "is-descendant=true" >> "$GITHUB_OUTPUT"
          else
            echo "is-descendant=false" >> "$GITHUB_OUTPUT"
            echo "Branch is not descended from docker — skipping CI and Docker build."
          fi

      - name: Sanitize branch name for Docker tag
        id: sanitize
        run: |
          SAFE=$(echo "${GITHUB_REF_NAME}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9-]/-/g' \
            | sed 's/-\+/-/g' \
            | sed 's/^-//;s/-$//')
          echo "safe-branch=${SAFE}" >> "$GITHUB_OUTPUT"

      - name: Get short SHA
        id: sha
        run: echo "short-sha=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

  build-linux-cpu:
    name: Build (Linux CPU)
    needs: check-ancestry
    if: needs.check-ancestry.outputs.is-descendant == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Validate OpenAPI spec
        run: python3 examples/server/validate_openapi.py

      - name: Build
        run: |
          cmake . -B ./build -DGGML_AVX2=ON -DSD_BUILD_SHARED_LIBS=ON
          cmake --build ./build --config Release --parallel

  build-and-push-docker:
    name: Build and push Vulkan Docker image
    needs: [check-ancestry, build-linux-cpu]
    if: needs.check-ancestry.outputs.is-descendant == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.vulkan
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.check-ancestry.outputs.safe-branch }}-${{ needs.check-ancestry.outputs.short-sha }}
          cache-from: |
            type=gha,scope=docker-${{ github.ref_name }}
            type=gha,scope=docker-docker
          cache-to: type=gha,mode=max,scope=docker-${{ github.ref_name }}
